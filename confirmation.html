    <style>
        * {
            margin: 0;

        }

        body {
            min-height: 100vh;
            background-color: #014f86;

            text-decoration: none;
            margin: 0 10px;

        }

        .btn {
            background: #1e90ff;
            padding: 8px 15px;
            border-radius: 5px;
        }

        .btn:hover {
            background: #0d6efd;
        }

        .message-box {
            position: relative;
            z-index: 2;
            max-width: 600px;
            margin: 150px auto;
            background: rgba(255,255,255,0.9);
            color: #003366;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
        }

        .message-box h1 {

            color: #014f86;
        }

        .verify-link {
            margin-top: 15px;
            display: inline-block;
            color: #1e90ff;
            text-decoration: underline;

        footer {

            color: white;

}
