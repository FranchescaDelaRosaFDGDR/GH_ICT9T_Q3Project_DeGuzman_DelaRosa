<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <title>Q3 Project</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }

        body {
            background: #014f86;
            color: white;
        }

        /* Add spacing below navbar */
        .page-content {
            padding: 60px 20px;
        }

        .container {
            max-width: 900px;
        }

        h1 {
            text-align: center;
            font-size: 48px;
            color: white;
        }

        .subtitle {
            text-align: center;
            margin-bottom: 40px;
            color: #d9ecff;
        }

        .faq {
            background: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 40px;
            color: #333;
        }

        .faq-item {
            border-bottom: 1px solid #ddd;
        }

        .faq-question {
            padding: 18px;
            cursor: pointer;
            font-weight: bold;
            color: #0059b3;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s;
        }

        .faq-question:hover {
            background: #f0f8ff;
        }

        .faq-answer {
            padding: 0 18px 18px;
            display: none;
            line-height: 1.6;
            color: #333;
        }

        .plus {
            font-size: 20px;
            color: #007bff;
        }

        .contact h3 {
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        button {
            background: #007bff;
            border: none;
            padding: 12px 25px;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-sm navbar-dark bg-dark">

                <span class="navbar-toggler-icon"></span>
            </button>

                    <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
                    <li class="nav-item"><a href="fairmatrix.html" class="nav-link">Fair Guide</a></li>

                <form class="d-flex" role="search">
                    <a href="registration.html" class="btn btn-primary">Create Account
                </a>

            </div>
        </div>

<div class="page-content">
<div class="container">

    <h1>Help is on the way!</h1><br>

    <div class="contact">
        <h4>If you need help, you may send us an email by filling up the following details.</h4><br>

        <form>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="fullname" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="Enter your email address" required>
            </div>

            <div class="form-group">
                <label>Message</label>
                <textarea name="message" placeholder="Enter your message" required></textarea>
            </div>

            <button type="submit">Submit</button>

        </form>

    </div>
</div>
</div>
