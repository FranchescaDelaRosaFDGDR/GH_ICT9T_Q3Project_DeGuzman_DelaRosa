<!DOCTYPE html>

<head>

     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <title>Q3 Project</title>
    <script>
        function previewimage(event) {
            const reader = new FileReader();
            reader.onload = function() {
                const output = document.getElementById('preview');
                output.src = reader.result;
            }
            reader.readAsDataURL(event.target.files[0]);
        }
    </script>
    <style>
        body {
            font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            background-color: #014f86;
            margin: 0;
        }

        .wrapper {
            min-width: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-box {
            width: 45px;
            background: #3e5f91;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .form-box {
            background: #89c2d9;
            padding: 25px;
            border-radius: 8px;
        }

        .form-box h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #444;
        }

       input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
            box-sizing: border-box;

       }


        button {
            width: 100%;
            padding: 10px;
            background-color: #80a3c7;
            color: rgba(255, 255, 255);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

 
        .pfp {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #1e3a8a;
            margin-bottom: 10px;
        }

        .card {
            background-color: #89c2d9
        }

    </style>
</head>
<body style="background-color: #014f86;">

    <div class="container mt-5">
    <h1 class="text-center text-white mb-4">Registration</h1>

    <div class="card p-4 mx-auto" style="max-width:600px">

        <img id="preview" class="pfp"
             src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
             alt="Profile Picture">

        <input type="file" class="form-control mb-3"
               onchange="previewimage(event)"><br>

        <h2 class="text-center mb-3">Create Account</h2>
        <h5 class="text-center mb-3">Kindly fill up the following details to create an account.</h5><br>

        <form>
            <div class="mb-3">
                <label>Full Name</label>
                <input type="text" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Age</label>
                <input type="number" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Username</label>
                <input type="text" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Contact Number</label>
                <input type="text" class="form-control" required>
            </div>

            <form class="d-flex" role="search">
                    <a href="confirmation.html" class="btn btn-primary">Create Account
                </a>
            </form>
        </form>
    </div>
</div><br>
